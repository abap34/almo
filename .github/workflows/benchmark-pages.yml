name: Benchmark Pages

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: benchmark-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3

      - name: Configure Pages
        if: env.ACT != 'true'
        uses: actions/configure-pages@v5

      - name: Build dashboard site
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ "${ACT}" = "true" ]; then
            python3 scripts/build_benchmark_dashboard.py \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --out-dir site \
              --fixture-json scripts/benchmark_pages/fixture_dashboard.json
          else
            python3 scripts/build_benchmark_dashboard.py \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --out-dir site \
              --token "$GITHUB_TOKEN"
          fi

      - name: Inspect generated site
        run: |
          test -f site/index.html
          test -f site/dev/bench/index.html
          test -f site/dev/bench/dashboard.json

      - name: Upload Pages artifact
        if: env.ACT != 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Skip deploy on act
        if: env.ACT == 'true'
        run: echo "Skipping Pages deploy under act"

      - name: Deploy to GitHub Pages
        if: env.ACT != 'true'
        id: deployment
        uses: actions/deploy-pages@v4
